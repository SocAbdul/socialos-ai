# Development-only stack. Production databases and brokers must remain on private networks.
name: socialos

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socialos}
      POSTGRES_USER: ${POSTGRES_USER:-socialos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      target: development
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-socialos}:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${POSTGRES_DB:-socialos}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    user: "10001:10001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn socialos.main:app --host 0.0.0.0 --reload"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./apps/api
      target: development
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-socialos}:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${POSTGRES_DB:-socialos}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
    user: "10001:10001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A socialos.infrastructure.tasks.celery_app worker --loglevel=INFO
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A socialos.infrastructure.tasks.celery_app inspect ping --timeout=5 | grep -q pong
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./apps/web
      target: development
    environment:
      API_INTERNAL_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}/api/v1
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
