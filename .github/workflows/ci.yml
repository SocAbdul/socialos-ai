name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: socialos
          POSTGRES_USER: socialos
          POSTGRES_PASSWORD: socialos-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U socialos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://socialos:socialos-ci@localhost:5432/socialos
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests
      - run: uv run alembic upgrade head
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install chromium
      - run: npm run test:e2e

  containers:
    runs-on: ubuntu-latest
    needs: [api, web]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build production API image
        run: docker build --target production -t socialos-api:${{ github.sha }} apps/api
      - name: Build production web image
        run: docker build --target production -t socialos-web:${{ github.sha }} apps/web
      - name: Validate Docker Compose
        run: docker compose config
      - name: Start complete development stack
        run: docker compose up --build --wait --wait-timeout 180
      - name: Verify API, web, Redis and worker
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/health/live
          curl --fail --silent --show-error http://127.0.0.1:3000 > /dev/null
          docker compose exec -T redis redis-cli ping | grep -q PONG
          docker compose exec -T worker celery -A socialos.infrastructure.tasks.celery_app inspect ping --timeout=5 | grep -q pong
      - name: Print stack diagnostics
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
